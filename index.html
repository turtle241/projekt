<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Snake game</h1>
        <button id="start">Start</button>
        <p>Score: 0</p>
        <a class="lb" href="leaderboard.html">Leaderboard</a>
    </header>

    <main>
        <canvas id="myCanvas" width="100" height="100"></canvas>
    </main>

    <!-- <footer>Footer</footer> -->

    <script src="script.js"></script>
    <br>
    <div class="keys">
        <button class="arrow" id="up"> ↑ </button><br>
        <button class="arrow" id="left">←</button>
        <button class="arrow" id="mid" disabled>○</button>
        <button class="arrow" id="right">→</button><br>
        <button class="arrow" id="down"> ↓ </button>
    </div>
</body>

</html>
